services:
  api:
    image: ghcr.io/bibekalemagar/casebe:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-case-api
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: legal-case-db
    restart: always
    environment:
      MYSQL_DATABASE: CMS
      MYSQL_USER: kendrix
      MYSQL_PASSWORD: kendrix
      MYSQL_ROOT_PASSWORD: kendrix
    ports:
      - '3307:3306' 
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
